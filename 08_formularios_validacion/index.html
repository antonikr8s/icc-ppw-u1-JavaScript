<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica 8 - Formularios y Validación</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page">
    <section class="container">
  <h1 class="titulo-principal" style="text-align: center; color: #1a4971; margin-bottom: 0px; padding-bottom: 5px;">
    Formulario de Registro
  </h1>
  
  <p class="subtitulo" style="text-align: center; color: #7f8c8d; margin-top: 0px; margin-bottom: 40px; font-style: italic;">
    Completa tus datos para crear una cuenta
  </p>
  
  <form id="form-registro" class="form-registro" novalidate>
    <div class="form-group">
      <label for="nombre">Nombre Completo *</label>
    
    <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            placeholder="Ej: Juan Pérez" 
            required 
            minlength="3"
            maxlength="50">
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico *</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="ejemplo@correo.com" 
            required>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono *</label>
          <input 
            type="tel" 
            id="telefono" 
            name="telefono" 
            placeholder="(099) 999-9999" 
            required
            pattern="[0-9]{10}">
          <small class="help-text" style="display: block; margin-top: 4px; margin-bottom: 4px; color: #6c757d; font-size: 0.85em;">
            10 dígitos sin espacios ni guiones
          </small>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
          <label for="fecha_nacimiento">Fecha de nacimiento *</label>
          <input 
            type="date" 
            id="fecha_nacimiento" 
            name="fecha_nacimiento" 
            required>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
          <label for="genero">Género *</label>
          <select id="genero" name="genero" required>
            <option value="">Seleccionar...</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
            <option value="prefiero_no_decir">Prefiero no decir</option>
          </select>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña *</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Mínimo 8 caracteres" 
            required 
            minlength="8">
          <small class="help-text" style="display: block; margin-top: 4px; margin-bottom: 4px; color: #6c757d; font-size: 0.85em;">
            Mínimo 8 caracteres, una mayúscula, una minúscula y un número
          </small>
          <div class="password-strength" id="password-strength"></div>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group">
          <label for="confirmar_password">Confirmar contraseña *</label>
          <input 
            type="password" 
            id="confirmar_password" 
            name="confirmar_password" 
            placeholder="Repetir contraseña" 
            required>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-group form-group-checkbox">
          <label class="checkbox-label" style="display: flex; align-items: center; justify-content: flex-start; gap: 10px; cursor: pointer; text-align: left;">
            <input 
              type="checkbox" 
              id="terminos" 
              name="terminos" 
              required
              style="margin: 0; width: auto; transform: scale(1.1);">
            <span style="font-weight: bold; color: #333;">Acepto los términos y condiciones *</span>
          </label>
          <div class="error-mensaje"></div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-enviar" class="btn-submit">
            Registrarse
          </button>
          <button type="button" id="btn-limpiar" class="btn-secondary">
            Limpiar formulario
          </button>
        </div>
      </form>
    </section>

    <section class="container">
      <div id="mensaje-estado" class="mensaje-estado oculto"></div>
    </section>

    <section class="container">
      <h2>Datos del último registro</h2>
      <div id="resultado-registro" class="resultado-vacio">
        <p>No hay datos enviados aún</p>
      </div>
    </section>
  </main>

  <script defer src="js/validacion.js"></script>
  <script defer src="js/components.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
